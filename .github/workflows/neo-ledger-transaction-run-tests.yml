name: CI/CD Pipeline - Transaction API

on:
  pull_request:
    branches: [ main ]
    paths: [ 'neo-ledger-transaction/**', 'common/**' ]
  push:
    tags:
      - "v*"

jobs:
  tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Unit & Integration Tests
        run: ./gradlew :neo-ledger-transaction:test

  build-and-push:
    name: Build and push image
    needs: tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_AT }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile/transaction.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            antoineromand/neo-ledger-transaction:${{ github.ref_name }}
            antoineromand/neo-ledger-transaction:latest

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/antoineromand/neo-ledger-transaction
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true