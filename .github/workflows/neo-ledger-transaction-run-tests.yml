name: Run unit tests and integration tests on neo-ledger-transaction api
on:
  push:
    branches: [ main ]
    paths:
      - 'neo-ledger-transaction/**'
      - 'common/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'neo-ledger-transaction/**'
      - 'common/**'

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Unit Tests
        run: ./gradlew :neo-ledger-transaction:test --tests "*UnitTest"

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Run Integration Tests
        run: ./gradlew :neo-ledger-transaction:test --tests "*IntTest"
